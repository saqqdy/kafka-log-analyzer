name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test-typescript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint

      - name: Build project
        run: pnpm run build

      - name: Run TypeScript tests
        run: pnpm test

      - name: Run TypeScript tests with coverage
        run: pnpm run test:coverage

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run Python tests
        run: |
          cd scripts
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload Python coverage
        if: success()
        uses: codecov/codecov-action@v3
        with:
          files: ./scripts/coverage.xml
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test-typescript

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Test CLI commands
        run: |
          node dist/cli.js --source file --path tests/fixtures/sample-kafka-log.txt
          node dist/cli.js --source file --path tests/fixtures/json-format.log --report json
          node dist/cli.js --source file --path tests/fixtures/all-event-types.log --report markdown
          node dist/cli.js --source file --path tests/fixtures/special-chars.log --report slack

      - name: Test all fixtures
        run: |
          for file in tests/fixtures/*.log tests/fixtures/*.txt; do
            if [ -f "$file" ]; then
              echo "Testing $file"
              node dist/cli.js --source file --path "$file" --report json || true
            fi
          done

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: pnpm audit --audit-level=moderate

      - name: Check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
